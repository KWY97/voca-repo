<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N3 모의고사오답 암기장</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f6f7fb;
      color: #222;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #20233a;
      color: white;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
    }
    h1 { margin: 0 0 10px; font-size: 22px; }
    .topbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    button, select, input {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      background: white;
    }
    button { cursor: pointer; font-weight: 700; }
    button:hover { filter: brightness(.96); }
    .primary { background: #4b5cff; color: white; border: none; }
    .danger { background: #ff4b5c; color: white; border: none; }
    .good { background: #19a974; color: white; border: none; }
    .ghost { background: #eef0ff; color: #20233a; border: none; }
    main { max-width: 980px; margin: 18px auto; padding: 0 14px 40px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat {
      background: white;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      text-align: center;
    }
    .stat b { display: block; font-size: 22px; margin-top: 4px; color: #4b5cff; }
    .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0,0,0,.08);
      margin-bottom: 16px;
    }
    .mode-label { color: #666; font-size: 14px; margin-bottom: 8px; }
    .jp { font-size: 44px; font-weight: 800; line-height: 1.2; text-align: center; margin: 10px 0 4px; }
    .kana { font-size: 20px; text-align: center; color: #666; min-height: 28px; }
    .kana.hidden, .reading.hidden { display: none; }
    .kanjiHelp {
      display: none;
      margin: 14px auto 0;
      max-width: 760px;
      background: #fff9e8;
      border: 1px solid #f0d58a;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.6;
    }
    .kanjiHelp b { font-size: 18px; }
    .kanjiHelp .piece { margin: 8px 0; padding: 8px; background: rgba(255,255,255,.65); border-radius: 10px; }
    .answer {
      margin: 20px auto 10px;
      padding: 18px;
      border-radius: 14px;
      background: #f2f3ff;
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      min-height: 66px;
      display: none;
    }
    .example { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,.12); font-size: 16px; line-height: 1.55; font-weight: 600; }
    .example .ko { color: #555; margin-top: 3px; }
    .buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 14px; }
    .quizbox { display: none; max-width: 560px; margin: 16px auto 0; }
    .quizbox input { width: 100%; padding: 14px; font-size: 18px; }
    .judge { text-align: center; min-height: 30px; font-size: 18px; font-weight: 800; margin-top: 10px; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 18px 0 10px; }
    .tab { background: white; border: 1px solid #ddd; }
    .tab.active { background: #20233a; color: white; }
    .list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .word {
      background: white;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      border-left: 5px solid #ddd;
    }
    .word.wrong { border-left-color: #ff4b5c; }
    .word.done { border-left-color: #19a974; }
    .word .kanji { font-size: 23px; font-weight: 800; }
    .word .reading { color: #666; margin: 3px 0; }
    .word .meaning { font-weight: 700; }
    .small { font-size: 13px; color: #777; }
    @media (max-width: 640px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .jp { font-size: 38px; }
      header { position: static; }
    }
  
.cinema-mode header,
.cinema-mode .stats,
.cinema-mode .tabs,
.cinema-mode #wordList,
.cinema-mode #kanjiHelp,
.cinema-mode .mode-label,
.cinema-mode #showBtn,
.cinema-mode #kanaBtn,
.cinema-mode #kanjiBtn,
.cinema-mode #prevBtn,
.cinema-mode #nextBtn,
.cinema-mode #quizBtn{
 display:none !important;
}
.cinema-mode .card{
 max-width:100%;
 min-height:85vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
}
.cinema-mode .jp{font-size:90px;}
.cinema-mode .kana{font-size:48px;}
.cinema-mode .answer{font-size:56px;display:block;}


.autoControls{display:none;width:100%;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px}
.autoControls label{display:inline-flex;align-items:center;gap:6px;font-weight:800;background:#f2f3ff;border-radius:12px;padding:8px 10px}
.autoControls input{width:76px;padding:8px;text-align:center}
.cinema-mode header,.cinema-mode .stats,.cinema-mode .tabs,.cinema-mode #wordList,.cinema-mode #kanjiHelp,.cinema-mode .mode-label,.cinema-mode #showBtn,.cinema-mode #kanaBtn,.cinema-mode #kanjiBtn,.cinema-mode #prevBtn,.cinema-mode #nextBtn{display:none!important}
.cinema-mode .autoControls{display:flex!important}
.cinema-mode main{max-width:100%;margin:0;padding:0}
.cinema-mode .card{max-width:100%;min-height:100vh;margin:0;border-radius:0;display:flex;flex-direction:column;justify-content:center}
.cinema-mode .jp{font-size:92px}
.cinema-mode .kana{font-size:48px}
.cinema-mode .answer{font-size:56px}
.cinema-mode .buttons{margin-top:24px}


.quizPanel{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
  margin:16px 0;
}
.quizTop{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.quizQuestion{
  text-align:center;
  font-size:44px;
  font-weight:900;
  margin:20px 0;
  padding:22px;
  background:#f2f3ff;
  border-radius:18px;
}
.choiceGrid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0,1fr));
  gap:10px;
}
.choiceBtn{
  padding:18px;
  font-size:20px;
  border-radius:14px;
  background:#fff;
  border:2px solid #ddd;
  font-weight:900;
}
.choiceBtn.correct{background:#e2f8ed;border-color:#19a974;color:#08784f}
.choiceBtn.wrong{background:#ffe5e8;border-color:#ff4b5c;color:#b30019}
.quizResult{font-size:18px;font-weight:900;text-align:center;min-height:28px;margin-top:12px}
.quizHidden{display:none}
@media(max-width:640px){.choiceGrid{grid-template-columns:1fr}.quizQuestion{font-size:36px}}
.cinema-mode .quizPanel{display:none!important}

</style>
</head>
<body>
  <header>
    <h1>N3 단어 · 부사 · 문형 암기장</h1>
    <div class="topbar">
      <select id="mainCategory" aria-label="큰 카테고리"></select>
      <select id="category" aria-label="세부 카테고리"></select>
      <select id="studyMode">
        <option value="jp-ko">일본어 → 뜻</option>
        <option value="ko-jp">뜻 → 일본어</option>
        <option value="kana-ko">요미가나 → 뜻</option>
      </select>
      <button class="ghost" id="shuffleBtn">섞기</button>
      <button class="ghost" id="wrongOnlyBtn">오답만</button>
      <button class="danger" id="resetBtn">기록 초기화</button>
    </div>
  </header>

  <main>
    <section class="stats">
      <div class="stat">전체 단어<b id="totalCount">0</b></div>
      <div class="stat">회독 완료<b id="doneCount">0</b></div>
      <div class="stat">오답 단어<b id="wrongCount">0</b></div>
      <div class="stat">현재 위치<b id="posCount">0</b></div>
    </section>

    <section class="card">
      <div class="mode-label" id="cardInfo"></div>
      <div class="jp" id="front"></div>
      <div class="kana" id="sub"></div>
      <div class="answer" id="answer"></div>
      <div class="kanjiHelp" id="kanjiHelp"></div>
      </div>
      <div class="buttons">
        <button class="primary" id="showBtn">정답 보기</button>
        <button class="ghost" id="kanaBtn">히라가나 보기</button>
        <button class="ghost" id="kanjiBtn">한자 풀이</button>
        <button class="good" id="knowBtn">알았다 / 회독완료</button>
        <button class="danger" id="wrongBtn">모름 / 오답추가</button>
<button class="primary" id="cinemaBtn">🎬 집중모드</button>
        
        <button id="prevBtn">← 이전</button>
        <button id="nextBtn">다음 →</button><div class="autoControls" id="autoControls">
          <button class="good" id="autoBtn">자동학습 시작</button>
          <label>단어 표시 간격(초) <input id="showSec" type="number" value="1" min="0.5" step="0.5"></label>
          <label>문제 사이 간격(초) <input id="waitSec" type="number" value="2" min="0.5" step="0.5"></label>
        </div>
      </div>
    </section>

    
<section class="quizPanel" id="multiQuizPanel">
  <h2>카테고리별 4지선다 퀴즈</h2>
  <div class="small" id="quizGuide">카테고리에 맞는 퀴즈 유형만 자동으로 보여줘.</div>
  <div class="quizTop">
    <select id="quizCategory"></select>
    <select id="quizType">
      <option value="j-r">한자 → 히라가나</option>
      <option value="r-j">히라가나 → 한자</option>
      <option value="j-k">한자 → 뜻</option>
      <option value="k-j">뜻 → 한자</option>
    </select>
    <button class="primary" id="startMultiQuiz">퀴즈 시작</button>
    <button class="ghost" id="nextMultiQuiz">다음 문제</button>
    <button class="danger" id="resetMultiQuiz">점수 초기화</button>
  </div>
  <div class="small" id="quizScore">정답 0 / 오답 0</div>
  <div class="quizQuestion" id="multiQuestion">퀴즈 시작을 눌러줘</div>
  <div class="choiceGrid" id="choiceGrid"></div>
  <div class="quizResult" id="multiResult"></div>
</section>

    <div class="tabs" id="tabs"></div>
    <section class="list" id="wordList"></section>
  </main>

const kanjiInfo = {};

const kanjiTitle={};
const kanjiRadical={};
const kanjiStory={};


function kanjiExplanation(word){
  const chars = [...word.j].filter(ch => kanjiInfo[ch] || kanjiTitle[ch]);
  if (!chars.length) return '<b>한자 풀이</b><br>이 단어는 한자 풀이가 없거나 가타카나/히라가나 단어야.';
  return `<b>${word.j}（${word.r}）</b><br><span class="small">※ 한자 자체 뜻 → 부수/구성 → 암기 풀이 순서로 보기.</span>` +
    chars.map(ch => {
      const title = kanjiTitle[ch] || '뜻 정보 보강 예정';
      const radical = kanjiRadical[ch] || '기본 부수/구성은 아래 풀이 참고';
      const base = kanjiInfo[ch] || '';
      const story = kanjiStory[ch] || base;
      return `<div class="piece"><b style="font-size:24px">${ch}</b>
      <div><b>한자 자체 뜻</b> : ${title}</div>
      <div><b>부수/구성</b> : ${radical}</div>
      <div><b>암기 풀이</b> : ${story}</div></div>`;
    }).join('');
}


let current = 0;
let pool = [...words];
let showWrongOnly = false;
let showKana = false;
let done = JSON.parse(localStorage.getItem('n3_new_done') || '[]');
let wrong = JSON.parse(localStorage.getItem('n3_new_wrong') || '[]');

const $ = id => document.getElementById(id);
const mainCategories = ['모의고사(06.30)', '모의고사(06.29)', '모의고사(06.25)', '모의고사(06.22)'];
let categories = [];
$('mainCategory').innerHTML = mainCategories.map(g => `<option value="${g}">${g}</option>`).join('');

function activeGroup(){ return $('mainCategory').value; }
function groupWords(){ return words.filter(w => w.g === activeGroup()); }
function rebuildCategories(){
  const previous = $('category').value;
  categories = ['전체', ...new Set(groupWords().map(w => w.c))];
  $('category').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
  $('category').value = categories.includes(previous) ? previous : '전체';
  $('tabs').innerHTML = categories.map((c,i) => `<button class="tab ${i===0?'active':''}" data-cat="${c}">${c}</button>`).join('');
  bindTabs();
}
function bindTabs(){
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
    $('category').value = t.dataset.cat;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    filterPool();
    if(typeof refreshQuizTypes === 'function') refreshQuizTypes();
  });
}
rebuildCategories();

function key(w){ return w.g + '|' + w.c + '|' + w.j + '|' + w.r; }
function save(){ localStorage.setItem('n3_new_done', JSON.stringify(done)); localStorage.setItem('n3_new_wrong', JSON.stringify(wrong)); }
function filterPool(){
  hideKana();
  const cat = $('category').value;
  pool = groupWords().filter(w => (cat === '전체' || w.c === cat) && (!showWrongOnly || wrong.includes(key(w))));
  if (pool.length === 0) pool = groupWords().filter(w => cat === '전체' || w.c === cat);
  current = 0;
  render();
}
function render(){
  if (!pool.length) return;
  const w = pool[current];
  const mode = $('studyMode').value;
  $('answer').style.display = 'none';
  $('kanjiHelp').style.display = 'none';
  $('cardInfo').textContent = `${w.g} / ${w.c} / ${current + 1}번째 카드`;
  const ex = w.e ? `<div class="example"><div>${w.e}</div>${w.ek ? `<div class="ko">${w.ek}</div>` : ''}</div>` : '';
  if (mode === 'jp-ko') { $('front').textContent = w.j; $('sub').textContent = w.r; $('answer').innerHTML = `${w.k}${ex}`; }
  if (mode === 'ko-jp') { $('front').textContent = w.k; $('sub').textContent = w.r; $('answer').innerHTML = `${w.j}${w.r ? `（${w.r}）` : ''}${ex}`; }
  if (mode === 'kana-ko') { $('front').textContent = w.r || w.j; $('sub').textContent = ''; $('answer').innerHTML = `${w.j} = ${w.k}${ex}`; }
  $('sub').style.display = (showKana && mode !== 'kana-ko' && $('sub').textContent) ? 'block' : 'none';
  $('kanaBtn').textContent = showKana ? '히라가나 숨기기' : '히라가나 보기';
  updateStats(); renderList();
}
function updateStats(){
  const active = groupWords();
  $('totalCount').textContent = active.length;
  $('doneCount').textContent = active.filter(w => done.includes(key(w))).length;
  $('wrongCount').textContent = active.filter(w => wrong.includes(key(w))).length;
  $('posCount').textContent = `${current + 1}/${pool.length}`;
}
function renderList(){
  const cat = $('category').value;
  const list = groupWords().filter(w => cat === '전체' || w.c === cat);
  $('wordList').innerHTML = list.map(w => {
    const k = key(w);
    return `<div class="word ${wrong.includes(k)?'wrong':''} ${done.includes(k)?'done':''}">
      <div class="kanji">${w.j}</div><div class="reading ${showKana ? '' : 'hidden'}">${w.r}</div><div class="meaning">${w.k}</div><div class="small">${w.c}</div>
    </div>`;
  }).join('');
}
function hideKana(){ showKana = false; }
function next(){ hideKana(); current = (current + 1) % pool.length; render(); }
function addUnique(arr, val){ if (!arr.includes(val)) arr.push(val); }

$('showBtn').onclick = () => $('answer').style.display = 'block';
$('kanaBtn').onclick = () => { showKana = !showKana; render(); };
$('kanjiBtn').onclick = () => { $('kanjiHelp').innerHTML = kanjiExplanation(pool[current]); $('kanjiHelp').style.display = $('kanjiHelp').style.display === 'block' ? 'none' : 'block'; };
$('knowBtn').onclick = () => { const k = key(pool[current]); addUnique(done,k); wrong = wrong.filter(x => x !== k); save(); next(); };
$('wrongBtn').onclick = () => { addUnique(wrong, key(pool[current])); save(); next(); };
$('nextBtn').onclick = next;
$('prevBtn').onclick = () => { hideKana(); current = (current - 1 + pool.length) % pool.length; render(); };
$('shuffleBtn').onclick = () => { hideKana(); pool.sort(() => Math.random() - 0.5); current = 0; render(); };
$('wrongOnlyBtn').onclick = () => { showWrongOnly = !showWrongOnly; $('wrongOnlyBtn').textContent = showWrongOnly ? '전체 보기' : '오답만'; filterPool(); };
$('resetBtn').onclick = () => { if(confirm('회독/오답 기록을 전부 지울까?')) { done=[]; wrong=[]; save(); render(); } };
$('mainCategory').onchange = () => {
  showWrongOnly = false;
  $('wrongOnlyBtn').textContent = '오답만';
  rebuildCategories();
  filterPool();
  if(typeof rebuildQuizCategories === 'function') rebuildQuizCategories();
  if(typeof refreshQuizTypes === 'function') refreshQuizTypes();
};
$('category').onchange = () => {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === $('category').value));
  filterPool();
};
$('studyMode').onchange = () => { hideKana(); render(); };

let cinema=false;
let auto=false;
let timers=[];

function clearTimers(){
 timers.forEach(t=>clearTimeout(t));
 timers=[];
}

$('cinemaBtn').onclick=()=>{
 cinema=!cinema;
 document.body.classList.toggle('cinema-mode',cinema);
 $('cinemaBtn').textContent=cinema?'🎬 집중모드 종료':'🎬 집중모드';
};

function autoLoop(){
 if(!auto) return;

 const show=Number($('showSec').value)*1000;
 const wait=Number($('waitSec').value)*1000;

 hideKana();
 $('answer').style.display='none';
 render();

 timers.push(setTimeout(()=>{
   showKana=true;
   render();

   timers.push(setTimeout(()=>{
      $('answer').style.display='block';

      timers.push(setTimeout(()=>{
         next();
         autoLoop();
      },wait));

   },show));

 },show));
}

// v5 집중모드/자동학습 정리
var autoRunning = false;
var v5Timers = [];
function v5ClearTimers(){ v5Timers.forEach(t => clearTimeout(t)); v5Timers = []; }
function enterCinema(){
  document.body.classList.add('cinema-mode');
  if($('cinemaBtn')) $('cinemaBtn').textContent='🎬 집중모드 종료';
}
function exitCinema(){
  document.body.classList.remove('cinema-mode');
  if($('cinemaBtn')) $('cinemaBtn').textContent='🎬 집중모드';
  autoRunning=false;
  if($('autoBtn')) $('autoBtn').textContent='자동학습 시작';
  v5ClearTimers();
}
function v5AutoLoop(){
  if(!autoRunning || !pool.length) return;
  const show = Math.max(0.1, Number($('showSec').value || 1)) * 1000;
  const wait = Math.max(0.1, Number($('waitSec').value || 2)) * 1000;
  hideKana(); render(); $('answer').style.display='none';
  v5Timers.push(setTimeout(()=>{
    if(!autoRunning) return;
    showKana=true; render();
    v5Timers.push(setTimeout(()=>{
      if(!autoRunning) return;
      $('answer').style.display='block';
      v5Timers.push(setTimeout(()=>{
        if(!autoRunning) return;
        next(); v5AutoLoop();
      }, wait));
    }, show));
  }, show));
}
if($('cinemaBtn')) $('cinemaBtn').onclick=()=>{ document.body.classList.contains('cinema-mode') ? exitCinema() : enterCinema(); };
if($('autoBtn')) $('autoBtn').onclick=()=>{
  if(!autoRunning){ enterCinema(); autoRunning=true; $('autoBtn').textContent='자동학습 정지'; v5ClearTimers(); v5AutoLoop(); }
  else { autoRunning=false; $('autoBtn').textContent='자동학습 시작'; v5ClearTimers(); }
};
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && document.body.classList.contains('cinema-mode')) exitCinema(); });


// 카테고리별 4지선다 퀴즈
function rebuildQuizCategories(){
  if(!$('quizCategory')) return;
  const previous = $('quizCategory').value;
  const quizCategories = ['현재 카테고리', '전체', ...new Set(groupWords().map(w => w.c))];
  $('quizCategory').innerHTML = quizCategories.map(c => `<option value="${c}">${c}</option>`).join('');
  $('quizCategory').value = quizCategories.includes(previous) ? previous : '현재 카테고리';
}
rebuildQuizCategories();

let mqCurrent = null;
let mqAnswer = '';
let mqAnswered = false;
let mqRight = Number(localStorage.getItem('n3_new_mq_right') || 0);
let mqWrong = Number(localStorage.getItem('n3_new_mq_wrong') || 0);

function normText(s){ return String(s).replace(/[（）()・\s,，、]/g,'').trim(); }

function getQuizPool(){
  let cat = $('quizCategory').value;
  if(cat === '현재 카테고리') cat = $('category').value;
  let arr = words.filter(w => cat === '전체' || w.c === cat);
  // 한자 문제가 필요한 모드에서는 가타카나/히라가나-only를 줄임
  const type = $('quizType').value;
  if(type.includes('j')) arr = arr.filter(w => /[\u4e00-\u9faf]/.test(w.j));
  return arr.length >= 4 ? arr : words.filter(w => /[\u4e00-\u9faf]/.test(w.j));
}

function pickQuestionText(w,type){
  if(type === 'j-r') return w.j;
  if(type === 'r-j') return w.r;
  if(type === 'j-k') return w.j;
  if(type === 'k-j') return w.k;
}
function pickAnswerText(w,type){
  if(type === 'j-r') return w.r;
  if(type === 'r-j') return w.j;
  if(type === 'j-k') return w.k;
  if(type === 'k-j') return w.j;
}

function shuffleArray(arr){
  return [...arr].sort(() => Math.random() - 0.5);
}

function makeChoices(pool, answerWord, type){
  const answer = pickAnswerText(answerWord,type);
  const answerNorm = normText(answer);
  let candidates = pool
    .filter(w => key(w) !== key(answerWord))
    .map(w => pickAnswerText(w,type))
    .filter(x => x && normText(x) !== answerNorm);

  // 헷갈리게: 같은 첫 글자/첫 음/같은 카테고리를 약간 우선
  const hint = normText(answer).slice(0,1);
  candidates.sort((a,b) => {
    const ah = normText(a).startsWith(hint) ? -1 : 0;
    const bh = normText(b).startsWith(hint) ? -1 : 0;
    return ah - bh || Math.random() - 0.5;
  });

  const unique = [];
  for(const c of candidates){
    if(!unique.some(x => normText(x) === normText(c))) unique.push(c);
    if(unique.length >= 3) break;
  }
  while(unique.length < 3){
    const r = pickAnswerText(words[Math.floor(Math.random()*words.length)], type);
    if(r && normText(r) !== answerNorm && !unique.some(x => normText(x) === normText(r))) unique.push(r);
  }
  return shuffleArray([answer, ...unique]);
}

function updateMultiScore(){
  if($('quizScore')) $('quizScore').textContent = `정답 ${mqRight} / 오답 ${mqWrong}`;
}

function newMultiQuestion(){
  const pool = getQuizPool();
  const type = $('quizType').value;
  mqCurrent = pool[Math.floor(Math.random()*pool.length)];
  mqAnswer = pickAnswerText(mqCurrent,type);
  mqAnswered = false;

  $('multiQuestion').textContent = pickQuestionText(mqCurrent,type);
  $('multiResult').textContent = '';
  const choices = makeChoices(pool, mqCurrent, type);
  $('choiceGrid').innerHTML = choices.map(c => `<button class="choiceBtn" data-choice="${String(c).replaceAll('"','&quot;')}">${c}</button>`).join('');

  document.querySelectorAll('.choiceBtn').forEach(btn => {
    btn.onclick = () => chooseMultiAnswer(btn);
  });
  updateMultiScore();
}

function chooseMultiAnswer(btn){
  if(mqAnswered) return;
  mqAnswered = true;
  const selected = btn.dataset.choice;
  const ok = normText(selected) === normText(mqAnswer);

  document.querySelectorAll('.choiceBtn').forEach(b => {
    if(normText(b.dataset.choice) === normText(mqAnswer)) b.classList.add('correct');
  });

  if(ok){
    mqRight++;
    $('multiResult').textContent = '정답!';
    $('multiResult').style.color = '#19a974';
    addUnique(done, key(mqCurrent));
    wrong = wrong.filter(x => x !== key(mqCurrent));
  }else{
    mqWrong++;
    btn.classList.add('wrong');
    $('multiResult').textContent = `오답! 정답: ${mqAnswer} / ${mqCurrent.j}（${mqCurrent.r}） = ${mqCurrent.k}`;
    $('multiResult').style.color = '#ff4b5c';
    addUnique(wrong, key(mqCurrent));
  }
  localStorage.setItem('n3_new_mq_right', mqRight);
  localStorage.setItem('n3_new_mq_wrong', mqWrong);
  save(); updateStats(); renderList(); updateMultiScore();
}

if($('startMultiQuiz')) $('startMultiQuiz').onclick = newMultiQuestion;
if($('nextMultiQuiz')) $('nextMultiQuiz').onclick = newMultiQuestion;
if($('resetMultiQuiz')) $('resetMultiQuiz').onclick = () => {
  mqRight = 0; mqWrong = 0;
  localStorage.setItem('n3_new_mq_right', 0);
  localStorage.setItem('n3_new_mq_wrong', 0);
  updateMultiScore();
  $('multiResult').textContent = '점수 초기화됨';
};
updateMultiScore();


// v7 퀴즈 수정: 카테고리별 가능한 문제 유형만 제공
const kanaOnlyCategories = ['부사', '문형·표현'];
const katakanaCategories = ['가타카나어'];
const normalQuizTypes = [
  ['j-r', '한자 → 히라가나'],
  ['r-j', '히라가나 → 한자'],
  ['j-k', '한자 → 뜻'],
  ['k-j', '뜻 → 한자']
];
const kanaOnlyQuizTypes = [
  ['j-k', '히라가나/표기 → 뜻']
];
const katakanaQuizTypes = [
  ['j-k', '가타카나 → 뜻']
];

function getActualQuizCategory(){
  let cat = $('quizCategory').value;
  if(cat === '현재 카테고리') cat = $('category').value;
  return cat;
}
function isKatakanaWord(w){ return /^[\u30a0-\u30ffー・]+$/.test(w.j); }
function hasKanjiWord(w){ return /[\u4e00-\u9faf]/.test(w.j); }
function allowedTypesByCategory(cat){
  if(katakanaCategories.includes(cat)) return katakanaQuizTypes;
  if(kanaOnlyCategories.includes(cat)) return kanaOnlyQuizTypes;
  return normalQuizTypes;
}
function refreshQuizTypes(){
  if(!$('quizType')) return;
  const cat = getActualQuizCategory();
  const allowed = allowedTypesByCategory(cat);
  const prev = $('quizType').value;
  $('quizType').innerHTML = allowed.map(([v,t]) => `<option value="${v}">${t}</option>`).join('');
  if(allowed.some(([v]) => v === prev)) $('quizType').value = prev;

  if($('quizGuide')){
    if(katakanaCategories.includes(cat)) $('quizGuide').textContent = '가타카나어는 가타카나를 보고 한국어 뜻을 고르는 문제만 출제돼.';
    else if(kanaOnlyCategories.includes(cat)) $('quizGuide').textContent = '부사·문형·표현은 표기를 보고 한국어 뜻을 고르는 문제만 출제돼.';
    else $('quizGuide').textContent = '이 카테고리는 한자↔히라가나, 한자↔뜻 문제를 풀 수 있어.';
  }
}
function getQuizPool(){
  let cat = getActualQuizCategory();
  let arr = groupWords().filter(w => cat === '전체' || w.c === cat);
  const type = $('quizType').value;

  if(katakanaCategories.includes(cat)){
    arr = arr.filter(isKatakanaWord);
  }else if(kanaOnlyCategories.includes(cat)){
    arr = arr.filter(w => w.c === cat);
  }else{
    arr = arr.filter(hasKanjiWord);
  }

  if(arr.length < 4){
    const sameCat = groupWords().filter(w => cat === '전체' || w.c === cat);
    if(sameCat.length >= 4) arr = sameCat;
  }
  return arr.length >= 4 ? arr : groupWords().filter(hasKanjiWord);
}
function pickQuestionText(w,type){
  const cat = getActualQuizCategory();
  if(katakanaCategories.includes(cat)) return w.j;
  if(kanaOnlyCategories.includes(cat)) return w.j;
  if(type === 'j-r') return w.j;
  if(type === 'r-j') return w.r;
  if(type === 'j-k') return w.j;
  if(type === 'k-j') return w.k;
  return w.j;
}
function pickAnswerText(w,type){
  const cat = getActualQuizCategory();
  if(katakanaCategories.includes(cat)) return w.k;
  if(kanaOnlyCategories.includes(cat)) return w.k;
  if(type === 'j-r') return w.r;
  if(type === 'r-j') return w.j;
  if(type === 'j-k') return w.k;
  if(type === 'k-j') return w.j;
  return w.k;
}
function makeChoices(pool, answerWord, type){
  const answer = pickAnswerText(answerWord,type);
  const answerNorm = normText(answer);
  let candidates = pool
    .filter(w => key(w) !== key(answerWord))
    .map(w => pickAnswerText(w,type))
    .filter(x => x && normText(x) !== answerNorm);

  const unique = [];
  for(const c of shuffleArray(candidates)){
    if(!unique.some(x => normText(x) === normText(c))) unique.push(c);
    if(unique.length >= 3) break;
  }
  if(unique.length < 3){
    for(const w of shuffleArray(groupWords())){
      const c = pickAnswerText(w,type);
      if(c && normText(c) !== answerNorm && !unique.some(x => normText(x) === normText(c))){
        unique.push(c);
      }
      if(unique.length >= 3) break;
    }
  }
  return shuffleArray([answer, ...unique.slice(0,3)]);
}
function newMultiQuestion(){
  refreshQuizTypes();
  const pool = getQuizPool();
  const type = $('quizType').value;
  mqCurrent = pool[Math.floor(Math.random()*pool.length)];
  mqAnswer = pickAnswerText(mqCurrent,type);
  mqAnswered = false;

  $('multiQuestion').textContent = pickQuestionText(mqCurrent,type);
  $('multiResult').textContent = '';
  const choices = makeChoices(pool, mqCurrent, type);
  $('choiceGrid').innerHTML = choices.map(c => `<button class="choiceBtn" data-choice="${String(c).replaceAll('"','&quot;')}">${c}</button>`).join('');

  document.querySelectorAll('.choiceBtn').forEach(btn => {
    btn.onclick = () => chooseMultiAnswer(btn);
  });
  updateMultiScore();
}
function chooseMultiAnswer(btn){
  if(mqAnswered) return;
  mqAnswered = true;
  const selected = btn.dataset.choice;
  const ok = normText(selected) === normText(mqAnswer);

  document.querySelectorAll('.choiceBtn').forEach(b => {
    if(normText(b.dataset.choice) === normText(mqAnswer)) b.classList.add('correct');
  });

  if(ok){
    mqRight++;
    $('multiResult').textContent = '정답!';
    $('multiResult').style.color = '#19a974';
    addUnique(done, key(mqCurrent));
    wrong = wrong.filter(x => x !== key(mqCurrent));
  }else{
    mqWrong++;
    btn.classList.add('wrong');
    $('multiResult').textContent = `오답! 정답: ${mqAnswer} / ${mqCurrent.j}（${mqCurrent.r}） = ${mqCurrent.k}`;
    $('multiResult').style.color = '#ff4b5c';
    addUnique(wrong, key(mqCurrent));
  }
  localStorage.setItem('n3_new_mq_right', mqRight);
  localStorage.setItem('n3_new_mq_wrong', mqWrong);
  save(); updateStats(); renderList(); updateMultiScore();
}
if($('quizCategory')) $('quizCategory').onchange = () => {
  refreshQuizTypes();
  $('multiQuestion').textContent = '퀴즈 시작을 눌러줘';
  $('choiceGrid').innerHTML = '';
  $('multiResult').textContent = '';
};
if($('category')) {
  const oldCategoryChangeForQuiz = $('category').onchange;
  $('category').onchange = (e) => {
    if(typeof oldCategoryChangeForQuiz === 'function') oldCategoryChangeForQuiz(e);
    refreshQuizTypes();
  };
}
if($('quizType')) $('quizType').onchange = () => {
  $('multiQuestion').textContent = '퀴즈 시작을 눌러줘';
  $('choiceGrid').innerHTML = '';
  $('multiResult').textContent = '';
};
if($('startMultiQuiz')) $('startMultiQuiz').onclick = newMultiQuestion;
if($('nextMultiQuiz')) $('nextMultiQuiz').onclick = newMultiQuestion;
refreshQuizTypes();

render();
</script>
